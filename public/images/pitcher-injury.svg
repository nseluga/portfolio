<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f9fafb"/>

  <!-- Title -->
  <text x="600" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="600" fill="#1f2937" text-anchor="middle">30-Day Injury Rate by Velocity Decline</text>
  <text x="600" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#6b7280" text-anchor="middle">Pitcher Injury Risk+ · Statcast 2015–2024 · n = 3,249 pitchers</text>

  <!-- Y-axis label -->
  <text x="52" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#6b7280" text-anchor="middle" transform="rotate(-90,52,350)">Injury Rate</text>

  <!-- Grid lines (y range: 0–20%, plot y: 130–560, height=430, scale=21.5px/%) -->
  <!-- 20% line -->
  <line x1="190" y1="130" x2="1060" y2="130" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="178" y="138" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#6b7280" text-anchor="end">20%</text>
  <!-- 15% line -->
  <line x1="190" y1="237" x2="1060" y2="237" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="178" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#6b7280" text-anchor="end">15%</text>
  <!-- 10% line -->
  <line x1="190" y1="345" x2="1060" y2="345" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="178" y="353" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#6b7280" text-anchor="end">10%</text>
  <!-- 5% line -->
  <line x1="190" y1="452" x2="1060" y2="452" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="178" y="460" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#6b7280" text-anchor="end">5%</text>
  <!-- 0% baseline -->
  <line x1="190" y1="560" x2="1060" y2="560" stroke="#9ca3af" stroke-width="2"/>
  <text x="178" y="568" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#6b7280" text-anchor="end">0%</text>

  <!-- Y-axis line -->
  <line x1="190" y1="120" x2="190" y2="560" stroke="#d1d5db" stroke-width="2"/>

  <!-- Bar 1: No significant decline — 6% → height=129, top=431 -->
  <rect x="270" y="431" width="240" height="129" fill="#9ca3af" rx="3"/>
  <text x="390" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="700" fill="#1f2937" text-anchor="middle">6%</text>
  <text x="390" y="490" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">IR+ 96.9</text>
  <text x="390" y="595" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#374151" text-anchor="middle">No significant</text>
  <text x="390" y="622" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#374151" text-anchor="middle">velocity decline</text>

  <!-- Bar 2: ≥2 mph decline — 12% → height=258, top=302 -->
  <rect x="700" y="302" width="240" height="258" fill="#1f2937" rx="3"/>
  <text x="820" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="700" fill="#1f2937" text-anchor="middle">12%</text>
  <text x="820" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#f9fafb" text-anchor="middle">IR+ 119.5</text>
  <text x="820" y="595" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#374151" text-anchor="middle">≥2 mph chronic</text>
  <text x="820" y="622" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#374151" text-anchor="middle">velocity decline</text>

  <!-- 2× annotation arrow -->
  <line x1="520" y1="302" x2="690" y2="302" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="605" y="294" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#6b7280" text-anchor="middle">2× rate</text>
</svg>
