<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f9fafb"/>

  <!-- Title -->
  <text x="600" y="55" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="600" fill="#1f2937" text-anchor="middle">Expected Points Value by Shot Distance</text>
  <text x="600" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#6b7280" text-anchor="middle">NBA Shot Value · 2014–15 · 122,203 shots · XGBoost AUC 0.6365</text>

  <!-- Y-axis label -->
  <text x="52" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#6b7280" text-anchor="middle" transform="rotate(-90,52,350)">Expected Points</text>

  <!-- Plot area: x 180–1080, y 110–560 (height=450), Y range 0–2.0, scale=225px/unit -->
  <!-- Grid lines -->
  <line x1="180" y1="110" x2="1080" y2="110" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="168" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="21" fill="#6b7280" text-anchor="end">2.0</text>
  <line x1="180" y1="222" x2="1080" y2="222" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="168" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="21" fill="#6b7280" text-anchor="end">1.5</text>
  <line x1="180" y1="335" x2="1080" y2="335" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="168" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="21" fill="#6b7280" text-anchor="end">1.0</text>
  <line x1="180" y1="447" x2="1080" y2="447" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="168" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="21" fill="#6b7280" text-anchor="end">0.5</text>
  <line x1="180" y1="560" x2="1080" y2="560" stroke="#9ca3af" stroke-width="2"/>
  <text x="168" y="568" font-family="system-ui,-apple-system,sans-serif" font-size="21" fill="#6b7280" text-anchor="end">0.0</text>

  <!-- Y-axis line -->
  <line x1="180" y1="100" x2="180" y2="560" stroke="#d1d5db" stroke-width="2"/>

  <!-- Zone shading: restricted area -->
  <rect x="180" y="110" width="65" height="450" fill="#1f2937" opacity="0.05"/>
  <!-- Corner 3 zone around x=823 -->
  <rect x="787" y="110" width="72" height="450" fill="#1f2937" opacity="0.06"/>

  <!-- Area fill under line
       8 points: x=180,309,437,566,694,823,951,1080
       y=560-value*225 → 144,234,290,324,335,301,324,358 -->
  <polygon points="180,560 180,144 309,234 437,290 566,324 694,335 823,301 951,324 1080,358 1080,560"
           fill="#1f2937" opacity="0.06"/>

  <!-- Main line -->
  <polyline points="180,144 309,234 437,290 566,324 694,335 823,301 951,324 1080,358"
            fill="none" stroke="#1f2937" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Data dots -->
  <circle cx="180" cy="144" r="9" fill="#1f2937"/>
  <circle cx="309" cy="234" r="9" fill="#1f2937"/>
  <circle cx="437" cy="290" r="9" fill="#1f2937"/>
  <circle cx="566" cy="324" r="9" fill="#1f2937"/>
  <circle cx="694" cy="335" r="9" fill="#1f2937"/>
  <circle cx="823" cy="301" r="9" fill="#1f2937"/>
  <circle cx="951" cy="324" r="9" fill="#1f2937"/>
  <circle cx="1080" cy="358" r="9" fill="#1f2937"/>

  <!-- Value labels -->
  <text x="180" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="600" fill="#1f2937" text-anchor="middle">1.85</text>

  <!-- Corner 3 annotation -->
  <text x="823" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="600" fill="#1f2937" text-anchor="middle">1.15</text>
  <text x="823" y="618" font-family="system-ui,-apple-system,sans-serif" font-size="19" fill="#6b7280" text-anchor="middle">Corner 3 bump</text>

  <!-- Mid-range label -->
  <text x="630" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">Mid-range trough</text>

  <!-- X-axis labels -->
  <text x="180" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="19" fill="#6b7280" text-anchor="middle">0–4 ft</text>
  <text x="437" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="19" fill="#6b7280" text-anchor="middle">8–14 ft</text>
  <text x="694" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="19" fill="#6b7280" text-anchor="middle">18–22 ft</text>
  <text x="1080" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="19" fill="#6b7280" text-anchor="middle">28+ ft</text>
  <text x="600" y="655" font-family="system-ui,-apple-system,sans-serif" font-size="21" fill="#6b7280" text-anchor="middle">Shot Distance</text>
</svg>
